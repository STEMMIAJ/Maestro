[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501"]  # line-too-long: scripts tem linhas longas por design (URLs, XPaths, mensagens)

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B"]  # testes podem usar asserts simples, funcoes longas

[tool.pytest.ini_options]
testpaths = ["tests"]
minversion = "7.0"
addopts = "-ra"
